server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Send nginx access logs to stdout/stderr so they show up in
  # CloudWatch via the ECS awslogs driver.
  access_log /dev/stdout;
  error_log  /dev/stderr;
}
