<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Orchestrator — ABC Bank Application</title>
  <link rel="icon" href="public/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="public/css/variables.css" />
  <link rel="stylesheet" href="public/css/base.css" />
  <link rel="stylesheet" href="public/css/pipeline.css" />
  <link rel="stylesheet" href="public/css/panel.css" />
  <link rel="stylesheet" href="public/css/agents.css" />
  <link rel="stylesheet" href="public/css/brd.css" />
  <link rel="stylesheet" href="public/css/documents.css" />
  <link rel="stylesheet" href="public/css/log.css" />
  <link rel="stylesheet" href="public/css/bankApp.css" />
  <link rel="stylesheet" href="public/css/observability.css" />
  <link rel="stylesheet" href="public/css/pr.css" />
  <link rel="stylesheet" href="public/css/animations.css" />
  <link rel="stylesheet" href="public/css/chatbot.css" />
</head>
<body>
  <div class="root" id="app">

    <!-- Top bar -->
    <header class="topbar">
      <div class="logo-mark" aria-label="AI Orchestrator">
        <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <circle cx="16" cy="16" r="11" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.45"/>
          <circle class="orbital-node" cx="16" cy="5" r="1.9" fill="#ffffff"/>
          <circle cx="27" cy="16" r="1.4" fill="#ffffff" opacity="0.7"/>
          <circle cx="5" cy="16" r="1.4" fill="#ffffff" opacity="0.7"/>
          <text x="16" y="21.5" font-family="Inter, sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.3">AI</text>
        </svg>
      </div>
      <div class="brand">
        <div class="brand-name">
          <span class="brand-ai">AI</span><span class="brand-orch">Orchestrator</span>
        </div>
        <div class="brand-sub">AI-Powered SDLC Pipeline</div>
      </div>
      <!-- Active feature chip — populated by App.renderFeatureBanner() when
           a feature suggestion is selected; auto-hidden otherwise. -->
      <div id="feature-banner" class="feature-banner" hidden aria-live="polite"></div>
      <div class="topbar-right">
        <button class="reset-btn" onclick="App.hardReset()">
          <i class="ti ti-refresh" aria-hidden="true"></i> Reset
        </button>
      </div>
    </header>

    <!-- Pipeline strip -->
    <section class="pipeline-wrap" aria-label="Pipeline phases">
      <div class="pipeline" id="strip"></div>
    </section>

    <!-- Main panel -->
    <main class="main-panel" id="main-panel" aria-live="polite">
      <div class="panel-head" id="panel-head">
        <div class="panel-head-icon" id="ph-icon-wrap">
          <i class="ti ti-file-description" id="ph-icon" style="font-size:15px;color:var(--cyan)" aria-hidden="true"></i>
        </div>
        <span class="panel-title" id="panel-title">Requirements Phase</span>
        <span class="badge b-active" id="panel-badge">● Active</span>
        <button type="button" class="panel-head-eye" id="panel-head-eye"
                onclick="App.viewMonitor()"
                title="View Log Aggregator — agent logs & activity log"
                aria-label="View Log Aggregator in Dashboard & Observability">
          <i class="ti ti-eye" aria-hidden="true"></i>
        </button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </main>

    <!-- Activity log -->
    <aside class="log-panel" aria-label="Activity log">
      <div class="log-head">
        <span class="log-head-title">
          <i class="ti ti-terminal-2" style="font-size:11px" aria-hidden="true"></i> Activity log
        </span>
        <span class="log-count" id="log-count">0 events</span>
      </div>
      <div class="log-box" id="log-box" role="log" aria-live="polite"></div>
    </aside>

  </div>

  <!-- Data modules -->
  <script src="src/data/phases.js"></script>
  <script src="src/data/agents.js"></script>
  <script src="src/data/streams.js"></script>
  <script src="src/data/documents.js"></script>
  <script src="src/data/signoffs.js"></script>
  <script src="src/data/brdData.js"></script>
  <script src="src/data/catalog.js"></script>
  <script src="src/data/featureSuggestions.js"></script>
  <script src="src/data/prStages.js"></script>

  <!-- Utility modules -->
  <script src="src/utils/logger.js"></script>
  <script src="src/utils/state.js"></script>

  <!-- Component modules -->
  <script src="src/components/strip.js"></script>
  <script src="src/components/agentGrid.js"></script>
  <script src="src/components/brdInput.js"></script>
  <script src="src/components/wireframe.js"></script>
  <script src="src/components/docViewer.js"></script>
  <script src="src/components/signOff.js"></script>
  <script src="src/components/prAgent.js"></script>
  <script src="src/components/bankApp.js"></script>
  <script src="src/components/observability.js"></script>
  <script src="src/components/monitorLogs.js"></script>
  <script src="src/components/phaseHero.js"></script>
  <script src="src/components/rejectControl.js"></script>

  <!-- Phase renderers -->
  <script src="src/phases/requirements.js"></script>
  <script src="src/phases/development.js"></script>
  <script src="src/phases/pr.js"></script>
  <script src="src/phases/deploy.js"></script>
  <script src="src/phases/generic.js"></script>

  <!-- Agent runner -->
  <script src="src/agents/runner.js"></script>

  <!-- Main app controller -->
  <script src="src/app.js"></script>

  <!-- Knowledge-base chatbot (talks to kb/server.py on :8765) -->
  <script src="src/components/chatbot.js"></script>
</body>
</html>
